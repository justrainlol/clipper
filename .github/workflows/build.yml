name: Build and Release Executable

on:
  push:
    tags:
      - 'v*'

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp pillow pyinstaller

    - name: Compile Executable with PyInstaller
      run: |
        pyinstaller --onefile --noconsole --name="clipper-win-x86-64" --icon="app_icon.ico" --add-data "app_icon.ico;." clipper_dl.py

    - name: Create GitHub Release and Upload Windows Asset
      uses: softprops/action-gh-release@v2
      with:
        files: dist/clipper-win-x86-64.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip3 install yt-dlp pillow pyinstaller

    - name: Compile Native Linux Binary with PyInstaller
      run: |
        pyinstaller --onefile --noconsole --name="clipper-linux-x86-64" --add-data "app_icon.ico:." clipper_dl.py

    - name: Upload Linux Asset to Existing Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/clipper-linux-x86-64
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
